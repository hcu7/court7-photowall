<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Foto-Wall · TV</title>
<style>
  :root{ --accent:#e0a04a; }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%; background:#0a0d14; overflow:hidden; cursor:none}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:#fff}

  #stage{position:fixed; inset:0; background:#0a0d14}

  /* Zwei Foto-Ebenen. Lückenloser Übergang: die neue Ebene liegt per z-index
     oben drauf und blendet über der alten ein (die alte bleibt solange voll
     sichtbar) -> nie ein dunkler Zwischenframe. */
  .layer{position:absolute; inset:0; opacity:0; background:#0a0d14;
    transition:opacity .9s ease;
    will-change:opacity; transform:translateZ(0); backface-visibility:hidden}
  .layer .bg{position:absolute; inset:0; background-size:cover; background-position:center;
    filter:blur(22px) brightness(.5); transform:scale(1.1) translateZ(0)}
  .layer .fg{position:absolute; inset:0; width:100%; height:100%;
    object-fit:contain; display:block; transform:translateZ(0)}

  /* Titel unten links */
  #title{position:fixed; left:42px; bottom:32px; z-index:10;
    font-size:clamp(22px,3.2vw,46px); font-weight:800; text-shadow:0 2px 18px rgba(0,0,0,.75)}
  /* Foto-Zahl oben rechts */
  #count{position:fixed; top:34px; right:40px; z-index:10;
    font-size:clamp(13px,1.4vw,20px); font-weight:700; opacity:.9;
    background:rgba(255,255,255,.14); padding:8px 16px; border-radius:999px; backdrop-filter:blur(8px)}

  /* QR-Ecke oben links */
  #qr{position:fixed; left:34px; top:30px; z-index:10; display:flex; align-items:center; gap:14px;
    background:rgba(255,255,255,.95); color:#0a0d14; padding:12px 16px 12px 12px; border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.45)}
  #qr img{width:clamp(74px,7vw,108px); height:clamp(74px,7vw,108px); display:block; border-radius:8px}
  #qr .txt{font-weight:800; line-height:1.2}
  #qr .txt small{display:block; font-weight:600; opacity:.7; font-size:.72em; margin-top:3px}

  /* Scrims für Lesbarkeit über hellen Fotos */
  #scrim-top{position:fixed; top:0; left:0; right:0; height:160px; z-index:9;
    background:linear-gradient(180deg,rgba(0,0,0,.45),transparent); pointer-events:none}
  #scrim-bottom{position:fixed; bottom:0; left:0; right:0; height:180px; z-index:9;
    background:linear-gradient(0deg,rgba(0,0,0,.55),transparent); pointer-events:none}

  /* "Neu"-Badge bei frischen Uploads */
  #newbadge{position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.6); z-index:20;
    background:linear-gradient(135deg,#e0a04a,#c8772f); color:#fff; font-size:clamp(22px,3vw,42px); font-weight:900;
    padding:16px 34px; border-radius:999px; box-shadow:0 16px 60px rgba(0,0,0,.5); opacity:0; pointer-events:none}
  #newbadge.flash{animation:pop 2.4s ease forwards}
  @keyframes pop{0%{opacity:0; transform:translate(-50%,-50%) scale(.6)}
    12%{opacity:1; transform:translate(-50%,-50%) scale(1.05)}
    20%{transform:translate(-50%,-50%) scale(1)}
    82%{opacity:1}100%{opacity:0; transform:translate(-50%,-58%) scale(1)}}

  @keyframes kb{from{transform:scale(1.02) translateZ(0)}to{transform:scale(1.07) translateZ(0)}}

  /* Empty-State */
  #empty{position:fixed; inset:0; z-index:15; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; text-align:center; padding:40px; background:#0a0d14}
  #empty.hidden{display:none}
  #empty .e-title{font-size:clamp(26px,4vw,56px); font-weight:800}
  #empty .e-sub{font-size:clamp(16px,2vw,26px); opacity:.8; max-width:18em}
  #empty .e-qr{background:#fff; padding:20px; border-radius:26px; box-shadow:0 20px 80px rgba(0,0,0,.5)}
  #empty .e-qr img{width:clamp(180px,26vw,300px); height:clamp(180px,26vw,300px); display:block}
  #empty .e-url{font-size:clamp(18px,2.4vw,30px); font-weight:800; color:var(--accent)}
  .pulse{animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
</style>
</head>
<body>
  <div id="stage">
    <div class="layer" id="layerA"><div class="bg"></div><img class="fg" alt="" /></div>
    <div class="layer" id="layerB"><div class="bg"></div><img class="fg" alt="" /></div>
  </div>

  <div id="scrim-top"></div>
  <div id="scrim-bottom"></div>

  <div id="qr">
    <img src="/api/qr.png" alt="QR" />
    <div class="txt">Mitmachen!<small id="qr-url"></small></div>
  </div>
  <div id="count"></div>
  <div id="title">…</div>

  <div id="newbadge">Neu! 🎉</div>

  <div id="empty">
    <div class="e-title" id="empty-title">…</div>
    <div class="e-sub">Scan den QR-Code, mach ein Selfie mit deiner Person — und schau hier zu! 📸</div>
    <div class="e-qr pulse"><img src="/api/qr.png" alt="QR" /></div>
    <div class="e-url" id="empty-url"></div>
  </div>

<script>
const $ = s => document.querySelector(s);
const params = new URLSearchParams(location.search);

let SLIDE = parseFloat(params.get('seconds')) || 4;     // ?seconds=5 überschreibt live
let SPOTLIGHT = 6;                                       // frische Fotos länger zeigen
const POLL_MS = 2500;

let order = [];            // alle bekannten IDs (chronologisch)
let known = new Set();
let lastId = '';
let queue = [];            // frische IDs -> als Spotlight
let idx = -1;
let initialized = false;

const layers = [
  { root:$('#layerA'), bg:$('#layerA .bg'), fg:$('#layerA .fg') },
  { root:$('#layerB'), bg:$('#layerB .bg'), fg:$('#layerB .fg') },
];
let cur = 0;     // aktuell sichtbare Ebene

fetch('/api/config').then(r=>r.json()).then(c=>{
  if(c.slideSeconds && !params.get('seconds')) SLIDE = c.slideSeconds;
  SPOTLIGHT = Math.max(SLIDE + 2, 6);
  $('#title').textContent = c.title || '';
  $('#empty-title').textContent = c.title || '';
  const u = (c.publicUrl||'').replace(/^https?:\/\//,'');
  $('#qr-url').textContent = u;
  $('#empty-url').textContent = u;
  document.title = (c.title||'Foto-Wall') + ' · TV';
}).catch(()=>{});

const sleep = ms => new Promise(r=>setTimeout(r,ms));

// Bild voll dekodieren, BEVOR es eingeblendet wird (verhindert schwarzes
// Aufblinken auf schwachen Geräten wie dem Fire TV Stick).
function decode(img){
  return new Promise(res=>{
    let done=false; const fin=()=>{ if(!done){done=true;res();} };
    if(img.decode){ img.decode().then(fin).catch(fin); }
    else { img.onload=fin; img.onerror=fin; }
    setTimeout(fin, 2000); // Sicherheitsnetz
  });
}

async function show(id, spotlight){
  const inc = layers[(cur+1)%2];
  const out = layers[cur];
  const url = `/photo/${id}`;
  inc.bg.style.backgroundImage = `url("${url}")`;
  inc.fg.src = url;
  await decode(inc.fg);                 // erst wenn fertig dekodiert
  // Ken-Burns neu starten, solange die Ebene noch unsichtbar ist (kein Flash)
  inc.fg.style.animation = 'none';
  void inc.fg.offsetWidth;
  inc.fg.style.animation = `kb ${(spotlight?SPOTLIGHT:SLIDE)+1.5}s ease-out forwards`;
  inc.root.style.zIndex = 2;            // neue Ebene oben, alte darunter (bleibt < Scrims/UI)
  out.root.style.zIndex = 1;
  inc.root.style.opacity = '1';         // blendet ein (transition)
  cur = (cur+1)%2;
  // alte Ebene erst nach dem Fade ausblenden -> immer volle Deckung
  setTimeout(()=>{ out.root.style.opacity = '0'; }, 950);
  if(spotlight){
    const b=$('#newbadge'); b.classList.remove('flash'); void b.offsetWidth; b.classList.add('flash');
  }
}

function setEmpty(isEmpty){
  $('#empty').classList.toggle('hidden', !isEmpty);
  $('#qr').style.display = isEmpty ? 'none' : 'flex';
  $('#title').style.display = isEmpty ? 'none' : 'block';
  $('#count').style.display = isEmpty ? 'none' : 'block';
}

async function loop(){
  while(true){
    let id, spotlight=false;
    if(queue.length){ id = queue.shift(); spotlight = true; }
    else if(order.length){ idx = (idx+1) % order.length; id = order[idx]; }
    else { setEmpty(true); await sleep(800); continue; }
    setEmpty(false);
    await show(id, spotlight);
    await sleep((spotlight ? SPOTLIGHT : SLIDE) * 1000);
  }
}

async function poll(){
  try{
    const r = await fetch('/api/photos?since='+encodeURIComponent(lastId));
    const data = await r.json();
    const n = data.count||0;
    $('#count').textContent = n + ' Foto' + (n===1?'':'s');
    for(const p of (data.photos||[])){
      if(known.has(p.id)) continue;
      known.add(p.id); order.push(p.id);
      if(p.id > lastId) lastId = p.id;
      if(initialized) queue.push(p.id);   // Erstbestand nicht als Spotlight
    }
    initialized = true;
  }catch(e){ /* Netz weg -> weiterlaufen */ }
}

(async function start(){
  await poll();
  loop();
  setInterval(poll, POLL_MS);
})();

// Vollbild beim ersten Tap/Klick (Fire-TV-Remote OK)
document.body.addEventListener('click', ()=>{ const el=document.documentElement; if(el.requestFullscreen) el.requestFullscreen().catch(()=>{}); });
// Bildschirm wachhalten
if('wakeLock' in navigator){ const req=()=>navigator.wakeLock.request('screen').catch(()=>{}); req(); document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') req(); }); }
</script>
</body>
</html>
