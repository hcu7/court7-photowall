<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Foto-Wall · TV</title>
<style>
  :root{ --accent:#e0a04a; }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%; background:#0a0d14; overflow:hidden; cursor:none}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:#fff}

  #stage{position:fixed; inset:0; background:#0a0d14}

  /* Zwei Foto-Layer für Crossfade. Jeder Layer: unscharfer Hintergrund-Fill + scharfes Bild. */
  .layer{position:absolute; inset:0; opacity:0; transition:opacity 1s ease}
  .layer.on{opacity:1}
  .layer .bg{position:absolute; inset:-4%; background-size:cover; background-position:center;
    filter:blur(34px) brightness(.45) saturate(1.2); transform:scale(1.08)}
  .layer .fg{position:absolute; inset:0; background-size:contain; background-position:center; background-repeat:no-repeat}
  .layer.kb .fg{animation:kb 7s ease-out forwards}
  @keyframes kb{from{transform:scale(1.04)}to{transform:scale(1.10)}}

  /* Titelzeile oben */
  #top{position:fixed; top:0; left:0; right:0; padding:30px 40px;
    background:linear-gradient(180deg,rgba(0,0,0,.65),transparent); z-index:10; display:flex; align-items:center; gap:18px}
  #title{font-size:clamp(22px,3.2vw,46px); font-weight:800; text-shadow:0 2px 18px rgba(0,0,0,.6)}
  #count{margin-left:auto; font-size:clamp(13px,1.4vw,20px); font-weight:700; opacity:.85;
    background:rgba(255,255,255,.12); padding:8px 16px; border-radius:999px; backdrop-filter:blur(8px)}

  /* "Neu"-Badge bei frischen Uploads */
  #newbadge{position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.6); z-index:20;
    background:linear-gradient(135deg,#e0a04a,#c8772f); color:#fff; font-size:clamp(22px,3vw,42px); font-weight:900;
    padding:16px 34px; border-radius:999px; box-shadow:0 16px 60px rgba(0,0,0,.5); opacity:0; pointer-events:none}
  #newbadge.flash{animation:pop 2.2s ease forwards}
  @keyframes pop{0%{opacity:0; transform:translate(-50%,-50%) scale(.6)}
    12%{opacity:1; transform:translate(-50%,-50%) scale(1.05)}
    20%{transform:translate(-50%,-50%) scale(1)}
    80%{opacity:1}100%{opacity:0; transform:translate(-50%,-58%) scale(1)}}

  /* QR-Ecke — Gäste können jederzeit scannen */
  #qr{position:fixed; right:34px; bottom:30px; z-index:10; display:flex; align-items:center; gap:14px;
    background:rgba(255,255,255,.95); color:#0a0d14; padding:12px 16px 12px 12px; border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.45)}
  #qr img{width:clamp(74px,7vw,108px); height:clamp(74px,7vw,108px); display:block; border-radius:8px}
  #qr .txt{font-weight:800; line-height:1.2}
  #qr .txt small{display:block; font-weight:600; opacity:.7; font-size:.72em; margin-top:3px}

  /* Empty-State */
  #empty{position:fixed; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; text-align:center; padding:40px}
  #empty.hidden{display:none}
  #empty .e-title{font-size:clamp(26px,4vw,56px); font-weight:800}
  #empty .e-sub{font-size:clamp(16px,2vw,26px); opacity:.8; max-width:18em}
  #empty .e-qr{background:#fff; padding:20px; border-radius:26px; box-shadow:0 20px 80px rgba(0,0,0,.5)}
  #empty .e-qr img{width:clamp(180px,26vw,300px); height:clamp(180px,26vw,300px); display:block}
  #empty .e-url{font-size:clamp(18px,2.4vw,30px); font-weight:800; color:var(--accent)}
  .pulse{animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
</style>
</head>
<body>
  <div id="stage">
    <div class="layer" id="layerA"><div class="bg"></div><div class="fg"></div></div>
    <div class="layer" id="layerB"><div class="bg"></div><div class="fg"></div></div>
  </div>

  <div id="top">
    <div id="title">…</div>
    <div id="count"></div>
  </div>

  <div id="newbadge">Neu! 🎉</div>

  <div id="qr">
    <img src="/api/qr.png" alt="QR" />
    <div class="txt">Mitmachen!<small id="qr-url"></small></div>
  </div>

  <div id="empty">
    <div class="e-title" id="empty-title">…</div>
    <div class="e-sub">Scan den QR-Code, mach ein Selfie mit deiner Person — und schau hier zu! 📸</div>
    <div class="e-qr pulse"><img src="/api/qr.png" alt="QR" /></div>
    <div class="e-url" id="empty-url"></div>
  </div>

<script>
const $ = s => document.querySelector(s);
const params = new URLSearchParams(location.search);

let SLIDE = parseFloat(params.get('seconds')) || 4;     // ?seconds=5 überschreibt live
const SPOTLIGHT = Math.max(SLIDE, 6);                   // frische Fotos länger zeigen
const POLL_MS = 2500;

let order = [];            // alle bekannten IDs (chronologisch)
let known = new Set();
let lastId = '';           // höchste bekannte ID (für ?since)
let queue = [];            // frische IDs, die als Spotlight drankommen
let idx = -1;              // Zeiger in order
let layers = [$('#layerA'), $('#layerB')];
let front = 0;             // welcher Layer gerade sichtbar ist
let running = false;

fetch('/api/config').then(r=>r.json()).then(c=>{
  if(c.slideSeconds && !params.get('seconds')) SLIDE = c.slideSeconds;
  $('#title').textContent = c.title || '';
  $('#empty-title').textContent = c.title || '';
  const u = (c.publicUrl||'').replace(/^https?:\/\//,'');
  $('#qr-url').textContent = u;
  $('#empty-url').textContent = u;
  document.title = (c.title||'Foto-Wall') + ' · TV';
}).catch(()=>{});

function preload(id){ const im=new Image(); im.src='/photo/'+id; return im; }

function paint(id, spotlight){
  const next = (front+1)%2;
  const L = layers[next];
  const url = `url("/photo/${id}")`;
  L.querySelector('.bg').style.backgroundImage = url;
  L.querySelector('.fg').style.backgroundImage = url;
  L.classList.remove('kb'); void L.offsetWidth; L.classList.add('kb'); // Ken-Burns neu starten
  layers[front].classList.remove('on');
  L.classList.add('on');
  front = next;
  if(spotlight){
    const b=$('#newbadge'); b.classList.remove('flash'); void b.offsetWidth; b.classList.add('flash');
  }
}

function setEmpty(isEmpty){
  $('#empty').classList.toggle('hidden', !isEmpty);
  $('#qr').style.display = isEmpty ? 'none' : 'flex';
}

async function loop(){
  if(running) return; running = true;
  while(true){
    let id, spotlight=false;
    if(queue.length){ id = queue.shift(); spotlight = true; }
    else if(order.length){ idx = (idx+1) % order.length; id = order[idx]; }
    else { setEmpty(true); await sleep(800); continue; }
    setEmpty(false);
    preload(id);
    paint(id, spotlight);
    await sleep((spotlight ? SPOTLIGHT : SLIDE) * 1000);
  }
}
const sleep = ms => new Promise(r=>setTimeout(r,ms));

async function poll(){
  try{
    const r = await fetch('/api/photos?since='+encodeURIComponent(lastId));
    const data = await r.json();
    $('#count').textContent = (data.count||0) + ' Foto' + ((data.count===1)?'':'s');
    const fresh = (data.photos||[]).filter(p=>!known.has(p.id));
    for(const p of fresh){
      known.add(p.id); order.push(p.id);
      if(p.id > lastId) lastId = p.id;
      // erste Ladung beim Start NICHT als Spotlight, sonst nur die letzten paar:
      if(initialized) queue.push(p.id);
    }
    initialized = true;
  }catch(e){ /* Netz weg → einfach weiterlaufen */ }
}
let initialized = false;

(async function start(){
  await poll();      // Erstbestand laden (ohne Spotlight)
  loop();
  setInterval(poll, POLL_MS);
})();

// Vollbild beim ersten Tap/Klick (Fire-TV-Remote OK)
document.body.addEventListener('click', ()=>{ const el=document.documentElement; if(el.requestFullscreen) el.requestFullscreen().catch(()=>{}); });
// Bildschirm wachhalten, falls unterstützt
if('wakeLock' in navigator){ const req=()=>navigator.wakeLock.request('screen').catch(()=>{}); req(); document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') req(); }); }
</script>
</body>
</html>
