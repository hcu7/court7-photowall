<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Foto-Wall · TV</title>
<style>
  :root{ --accent:#e0a04a; --green:#16443a; --green2:#0c2a22; }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%; background:#0a0d14; overflow:hidden; cursor:none}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:#fff}

  #stage{position:fixed; inset:0; background:#0a0d14}
  .layer{position:absolute; inset:0; opacity:0; background:#0a0d14;
    transition:opacity .9s ease; will-change:opacity; transform:translateZ(0); backface-visibility:hidden}
  .layer .bg{position:absolute; inset:0; background-size:cover; background-position:center;
    filter:blur(16px) brightness(.5); transform:scale(1.1) translateZ(0)}
  .layer .fg{position:absolute; inset:0; background-size:contain; background-position:center;
    background-repeat:no-repeat; transform:translateZ(0)}

  /* QR-Ecke oben links */
  #qr{position:fixed; left:34px; top:30px; z-index:10; display:flex; align-items:center; gap:14px;
    background:rgba(255,255,255,.95); color:#0a0d14; padding:12px 16px 12px 12px; border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.45)}
  #qr img{width:clamp(74px,7vw,108px); height:clamp(74px,7vw,108px); display:block; border-radius:8px}
  #qr .txt{font-weight:800; line-height:1.2}
  #qr .txt small{display:block; font-weight:600; opacity:.7; font-size:.72em; margin-top:3px}

  /* Titel + Foto-Zahl oben rechts */
  #brand-tr{position:fixed; top:30px; right:40px; z-index:10; text-align:right}
  #brand-tr .t{font-size:clamp(20px,2.8vw,42px); font-weight:800; text-shadow:0 2px 16px rgba(0,0,0,.7)}
  #brand-tr .c{margin-top:10px; font-size:clamp(12px,1.3vw,18px); font-weight:700; opacity:.92;
    background:rgba(255,255,255,.14); padding:7px 15px; border-radius:999px; backdrop-filter:blur(8px); display:inline-block}

  /* Kommentar unten links */
  #comment{position:fixed; left:42px; bottom:34px; z-index:10; max-width:62vw;
    font-size:clamp(20px,2.7vw,42px); font-weight:700; line-height:1.25;
    text-shadow:0 2px 16px rgba(0,0,0,.9); display:none}
  #comment.show{display:block}

  #scrim-top{position:fixed; top:0; left:0; right:0; height:200px; z-index:9;
    background:linear-gradient(180deg,rgba(0,0,0,.5),transparent); pointer-events:none}
  #scrim-bottom{position:fixed; bottom:0; left:0; right:0; height:240px; z-index:9;
    background:linear-gradient(0deg,rgba(0,0,0,.62),transparent); pointer-events:none}

  #newbadge{position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.6); z-index:20;
    background:linear-gradient(135deg,#e0a04a,#c8772f); color:#fff; font-size:clamp(22px,3vw,42px); font-weight:900;
    padding:16px 34px; border-radius:999px; box-shadow:0 16px 60px rgba(0,0,0,.5); opacity:0; pointer-events:none}
  #newbadge.flash{animation:pop 2.4s ease forwards}
  @keyframes pop{0%{opacity:0; transform:translate(-50%,-50%) scale(.6)}
    12%{opacity:1; transform:translate(-50%,-50%) scale(1.05)}20%{transform:translate(-50%,-50%) scale(1)}
    82%{opacity:1}100%{opacity:0; transform:translate(-50%,-58%) scale(1)}}

  @keyframes kb{from{transform:scale(1.02) translateZ(0)}to{transform:scale(1.07) translateZ(0)}}

  #winnerbadge{position:fixed; top:clamp(96px,12vh,150px); left:50%; transform:translateX(-50%); z-index:11;
    background:linear-gradient(135deg,#e0a04a,#c8772f); color:#0a0d14; font-weight:900;
    font-size:clamp(15px,1.8vw,26px); padding:10px 24px; border-radius:999px; box-shadow:0 8px 30px rgba(0,0,0,.5);
    display:none; max-width:84vw; text-align:center}
  #winnerbadge.show{display:block}

  /* "Wettbewerb beendet – Siegerehrung folgt" (oben, solange Sieger noch nicht gezeigt) */
  #endbanner{position:fixed; top:clamp(96px,12vh,150px); left:50%; transform:translateX(-50%) translateY(-8px); z-index:12;
    background:linear-gradient(135deg,#e0a04a,#c8772f); color:#0a0d14; font-weight:900;
    font-size:clamp(15px,1.9vw,28px); padding:12px 30px; border-radius:999px; box-shadow:0 8px 30px rgba(0,0,0,.5);
    white-space:nowrap; max-width:92vw; text-align:center; opacity:0; pointer-events:none; transition:opacity .4s ease, transform .4s ease}
  #endbanner.show{opacity:1; transform:translateX(-50%) translateY(0)}

  /* COURT7-Werbung (alle paar Bilder) */
  #feat{position:fixed; inset:0; z-index:30; display:flex; opacity:0; transition:opacity .6s ease;
    background:linear-gradient(135deg,var(--green),var(--green2) 70%)}
  #feat.show{opacity:1}
  #feat.hidden{display:none}
  #feat .feat-left{flex:0 0 42%; display:flex; flex-direction:column; justify-content:space-between;
    padding:clamp(28px,4vw,64px)}
  #feat .feat-brand{display:flex; flex-direction:column; align-items:flex-start}
  #feat .feat-logo{height:clamp(40px,5vw,74px); width:auto; display:block}
  #feat .feat-brand small{font-size:clamp(13px,1.4vw,19px); font-weight:700; letter-spacing:.2em; opacity:.8; margin-top:12px}
  #feat .feat-kicker{color:var(--accent); font-weight:800; letter-spacing:.14em; text-transform:uppercase; font-size:clamp(12px,1.3vw,18px)}
  #feat .feat-line{font-size:clamp(26px,3.4vw,52px); font-weight:800; line-height:1.1; margin:10px 0 22px}
  #feat .feat-prod{font-size:clamp(16px,1.7vw,24px); font-weight:700; opacity:.9}
  #feat .feat-price{font-size:clamp(26px,3vw,46px); font-weight:900; color:var(--accent); margin-top:4px}
  #feat .feat-cta{display:inline-block; margin-top:20px; background:var(--accent); color:#0a0d14; font-weight:900;
    font-size:clamp(16px,1.8vw,26px); padding:12px 24px; border-radius:999px; align-self:flex-start}
  #feat .feat-qr{display:flex; align-items:center; gap:16px}
  #feat .feat-qr img{width:clamp(96px,9vw,150px); height:clamp(96px,9vw,150px); background:#fff; padding:8px; border-radius:14px}
  #feat .feat-qr div{font-size:clamp(14px,1.4vw,20px); font-weight:700; line-height:1.3}
  #feat .feat-right{flex:1; background:#f6efe2; display:flex; align-items:center; justify-content:center; gap:clamp(18px,3vw,48px); padding:clamp(20px,3vw,56px)}
  #feat .feat-fig{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:clamp(8px,1.4vh,16px); margin:0; min-width:0}
  #feat .feat-fig.one{max-width:100%}
  #feat .feat-fig.two{max-width:48%}
  #feat .feat-fig img{max-width:100%; object-fit:contain; border-radius:10px; display:block}
  #feat .feat-fig.one img{max-height:78vh}
  #feat .feat-fig.two img{max-height:64vh}
  #feat .feat-fig figcaption{color:#0a0d14; font-weight:800; font-size:clamp(13px,1.5vw,21px); text-align:center; line-height:1.2}
  #feat .feat-tag{position:absolute; top:22px; right:28px; font-size:clamp(11px,1.1vw,15px); font-weight:700;
    opacity:.7; background:rgba(0,0,0,.25); padding:6px 14px; border-radius:999px}

  #ceremony{position:fixed; inset:0; z-index:40; background:linear-gradient(135deg,var(--green),var(--green2) 75%)}
  #ceremony.hidden{display:none}
  #ceremony .cer-card{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:6vw; gap:20px}
  #cer-kicker{color:var(--accent); font-weight:800; letter-spacing:.16em; text-transform:uppercase; font-size:clamp(18px,2.4vw,34px)}
  #cer-count{font-size:clamp(140px,28vw,440px); font-weight:900; line-height:.9; color:#fff; text-shadow:0 10px 60px rgba(0,0,0,.4)}
  #cer-count:empty{display:none}
  #cer-big{font-size:clamp(34px,5.5vw,88px); font-weight:900; line-height:1.06; max-width:18em}
  #cer-big:empty{display:none}
  #cer-sub{font-size:clamp(16px,2vw,28px); opacity:.85; max-width:24em}
  #ceremony .cer-photo{position:absolute; inset:0; display:none}
  #cer-bg{position:absolute; inset:0; background-size:cover; background-position:center; filter:blur(18px) brightness(.4); transform:scale(1.1)}
  #cer-fg{position:absolute; inset:0; background-size:contain; background-position:center; background-repeat:no-repeat; transition:inset .5s ease}
  #ceremony.reveal #cer-fg{inset:0 0 27% 0}
  #cer-caption{position:absolute; left:0; right:0; bottom:0; height:27%; display:none; flex-direction:column; align-items:center; justify-content:center; gap:clamp(8px,1.4vh,18px); text-align:center; padding:0 6vw 5vh; background:linear-gradient(0deg, rgba(10,13,20,.95), rgba(10,13,20,.55) 62%, transparent)}
  #ceremony.reveal #cer-caption{display:flex}
  #cer-cap-kicker{color:var(--accent); font-weight:800; letter-spacing:.14em; text-transform:uppercase; font-size:clamp(14px,1.8vw,26px)}
  #cer-cap-text{font-weight:800; font-size:clamp(22px,3vw,48px); line-height:1.15; max-width:92vw}
  @keyframes cpop{0%{transform:scale(.5);opacity:0}45%{transform:scale(1.12);opacity:1}100%{transform:scale(1);opacity:1}}

  #empty{position:fixed; inset:0; z-index:25; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; text-align:center; padding:40px; background:#0a0d14}
  #empty.hidden{display:none}
  #empty .e-title{font-size:clamp(26px,4vw,56px); font-weight:800}
  #empty .e-sub{font-size:clamp(16px,2vw,26px); opacity:.8; max-width:18em}
  #empty .e-qr{background:#fff; padding:20px; border-radius:26px; box-shadow:0 20px 80px rgba(0,0,0,.5)}
  #empty .e-qr img{width:clamp(180px,26vw,300px); height:clamp(180px,26vw,300px); display:block}
  #empty .e-url{font-size:clamp(18px,2.4vw,30px); font-weight:800; color:var(--accent)}
  .pulse{animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
</style>
</head>
<body>
  <div id="stage">
    <div class="layer" id="layerA"><div class="bg"></div><div class="fg"></div></div>
    <div class="layer" id="layerB"><div class="bg"></div><div class="fg"></div></div>
  </div>

  <div id="scrim-top"></div>
  <div id="scrim-bottom"></div>

  <div id="qr">
    <img src="/api/qr.png" alt="QR" />
    <div class="txt">Mitmachen!<small id="qr-url"></small></div>
  </div>
  <div id="brand-tr">
    <div class="t" id="title">…</div>
    <div class="c" id="count"></div>
  </div>
  <div id="comment"></div>

  <div id="newbadge">Neu! 🎉</div>
  <div id="winnerbadge"></div>

  <div id="feat" class="hidden">
    <div class="feat-left">
      <div class="feat-brand"><img class="feat-logo" src="/static/gear/logo-white.png" alt="COURT7" /><small>court7.eu</small></div>
      <div>
        <div class="feat-kicker">In eigener Sache 😄</div>
        <div class="feat-line" id="feat-line"></div>
        <div class="feat-prod" id="feat-title"></div>
        <div class="feat-price" id="feat-price"></div>
        <div class="feat-cta">Jetzt shoppen 🛒</div>
      </div>
      <div class="feat-qr"><img id="feat-qr" alt="QR" /><div>Scannen →<br><b>court7.eu</b></div></div>
    </div>
    <div class="feat-right" id="feat-imgs"></div>
    <div class="feat-tag">Werbung · gleich geht's weiter</div>
  </div>

  <div id="endbanner">🏆 Wettbewerb beendet — Siegerehrung folgt</div>

  <div id="ceremony" class="hidden">
    <div class="cer-photo" id="cer-photo">
      <div class="cer-bg" id="cer-bg"></div>
      <div class="cer-fg" id="cer-fg"></div>
    </div>
    <div class="cer-caption" id="cer-caption">
      <div class="cer-cap-kicker" id="cer-cap-kicker"></div>
      <div class="cer-cap-text" id="cer-cap-text"></div>
    </div>
    <div class="cer-card" id="cer-card">
      <div class="cer-kicker" id="cer-kicker"></div>
      <div class="cer-count" id="cer-count"></div>
      <div class="cer-big" id="cer-big"></div>
      <div class="cer-sub" id="cer-sub"></div>
    </div>
  </div>

  <div id="empty">
    <div class="e-title" id="empty-title">…</div>
    <div class="e-sub">Scan den QR-Code, mach ein Selfie mit deiner Person — und schau hier zu! 📸</div>
    <div class="e-qr pulse"><img src="/api/qr.png" alt="QR" /></div>
    <div class="e-url" id="empty-url"></div>
  </div>

<script>
const $ = s => document.querySelector(s);
const params = new URLSearchParams(location.search);

let SLIDE = parseFloat(params.get('seconds')) || 4;
let SPOTLIGHT = 6;
const POLL_MS = 4000;
const AD_EVERY = 10;     // alle 10 Fotos eine Werbung
const AD_SECONDS = 6;    // Werbung 6 Sekunden einblenden

// COURT7-Produkte für die Werbung (Bilder liegen lokal in /static/gear).
// WICHTIG: AD-IN = "Serve & Chill"-Serie = Crossover (Platz + Alltag) -> KEINE
// "on court"/"Court-Look"-Copy. Performance-Linie (blau/rot) = Court-OK.
const ADS = [
  { line:'Serve & Chill in Grün.',         title:'AD-IN Tee Green 200',                  price:'45 €',    url:'https://court7.eu/products/ad-in-200-basic-tee-green',           imgs:['/static/gear/prod-green-tee.jpg'],                                      names:['AD-IN Tee Green 200'] },
  { line:'Grün – drinnen wie draußen.',     title:'AD-IN Tee + Dual Pocket Shorts',       price:'je 45 €', url:'https://court7.eu/collections/all',                             imgs:['/static/gear/prod-green-tee.jpg','/static/gear/prod-shorts-green.jpg'], names:['AD-IN Tee Green','Dual Pocket Shorts Green'] },
  { line:'Blau. Cool durchgespielt.',       title:'Performance Tee + Dual Pocket Shorts', price:'je 45 €', url:'https://court7.eu/collections/all',                             imgs:['/static/gear/prod-blue-tee.jpg','/static/gear/prod-shorts-blue.jpg'],   names:['Performance Tee Blue','Dual Pocket Shorts Blue'] },
  { line:'1 Liter. Immer dabei.',           title:'COURT7 Sportflasche · 1 L',            price:'20 €',    url:'https://court7.eu/products/court-7-sportflasche',                imgs:['/static/gear/prod-bottle.jpg'],                                         names:['COURT7 Sportflasche · 1 L'] },
  { line:'Raglan-Cut in Rot.',              title:'Performance Tee Raglan · Red',         price:'45 €',    url:'https://court7.eu/products/performance-raglan-contrast-tee-red', imgs:['/static/gear/prod-red-raglan.jpg'],                                     names:['Performance Tee Raglan Red'] },
  { line:'Cap auf, Sonne raus.',            title:'Court Cap',                            price:'25 €',    url:'https://court7.eu/products/court-cap',                           imgs:['/static/gear/prod-cap.jpg'],                                            names:['Court Cap'] },
  { line:'Dezentes Logo, volle Dämpfung.',  title:'COURT7 Tennissocke · 2 Pack',          price:'11 €',    url:'https://court7.eu/products/sock',                                imgs:['/static/gear/prod-socks.jpg'],                                          names:['COURT7 Tennissocke (2 Pack)'] },
];

let order = [];               // IDs in Anzeige-Reihenfolge (vom Server)
let meta = new Map();          // id -> comment
let known = new Set();
let queue = [];                // frische IDs -> Spotlight
let idx = -1;
let initialized = false;
let shownSinceAd = 0, adIdx = 0;
let ceremony = { active:false, winners:{} };   // Sieger-Show
let cerSlides = [], cerIdx = 0;
let cerFirstPass = true;   // Countdown nur beim 1. Durchlauf einer Sieger-Show

const layers = [
  { root:$('#layerA'), bg:$('#layerA .bg'), fg:$('#layerA .fg') },
  { root:$('#layerB'), bg:$('#layerB .bg'), fg:$('#layerB .fg') },
];
let cur = 0;

fetch('/api/config').then(r=>r.json()).then(c=>{
  if(c.slideSeconds && !params.get('seconds')) SLIDE = c.slideSeconds;
  SPOTLIGHT = Math.max(SLIDE + 2, 6);
  $('#title').textContent = c.title || '';
  $('#empty-title').textContent = c.title || '';
  const u = (c.publicUrl||'').replace(/^https?:\/\//,'');
  $('#qr-url').textContent = u;
  $('#empty-url').textContent = u;
  document.title = (c.title||'Foto-Wall') + ' · TV';
}).catch(()=>{});

const sleep = ms => new Promise(r=>setTimeout(r,ms));

// Bild komplett vordecodieren, BEVOR es als background-image gesetzt wird:
// background-image malt atomar (kein progressives Halb-Laden wie <img>) und
// sofort (kein schwarzer Leerframe).
function decode(url){
  return new Promise(res=>{
    const im = new Image(); let done=false; const fin=()=>{ if(!done){done=true;res();} };
    if(im.decode){ im.src=url; im.decode().then(fin).catch(fin); }
    else { im.onload=fin; im.onerror=fin; im.src=url; }
    setTimeout(fin, 2500);
  });
}

// Anzeigedauer: länger, wenn ein (langer) Kommentar gelesen werden soll.
function dwellFor(comment, spotlight){
  let s = spotlight ? SPOTLIGHT : SLIDE;
  if(comment){ s = Math.max(s, SLIDE) + Math.min(comment.length/12, 10); }
  return Math.min(s, 16);
}

async function show(id, spotlight){
  const inc = layers[(cur+1)%2], out = layers[cur];
  const fgUrl = `/photo/${id}`;          // VOLLES Bild — zuverlässig, kein Resize-Stau unter Last (kein Schwarz)
  const bgUrl = `/photo/${id}?w=400`;    // vorab erzeugter Blur-Hintergrund (lädt async)
  await decode(fgUrl);                    // nur das sichtbare Foto abwarten
  inc.fg.style.backgroundImage = `url("${fgUrl}")`;
  inc.bg.style.backgroundImage = `url("${bgUrl}")`;   // bg ohne decode-gate -> blockiert das Foto nie
  inc.fg.style.animation = 'none'; void inc.fg.offsetWidth;
  inc.fg.style.animation = 'kb 9s ease-in-out infinite alternate';   // Dauer-Zoom -> ständige Bewegung, hält den TV wach
  inc.root.style.zIndex = 2; out.root.style.zIndex = 1;
  inc.root.style.opacity = '1';
  cur = (cur+1)%2;
  setTimeout(()=>{ out.root.style.opacity = '0'; out.fg.style.animation = 'none'; }, 950);  // unsichtbare Ebene nicht weiter zoomen (GPU sparen)

  const comment = meta.get(id) || '';
  const cEl = $('#comment');
  cEl.textContent = comment;
  cEl.classList.toggle('show', !!comment);

  // Sieger-Badge: nach Wettbewerbsende werden die Siegerfotos in der Diashow markiert.
  let wt = '';
  if(ceremony.state === 'ended' && ceremony.revealed){   // Badges erst NACH der Sieger-Show
    const w = ceremony.winners || {};
    if(w.commonality && w.commonality.id === id) wt = '🏆 Originellste Gemeinsamkeit';
    if(w.photo && w.photo.id === id) wt = (wt ? wt + '  ·  ' : '') + '🏆 Originellstes Foto';
  }
  const wb = $('#winnerbadge'); wb.textContent = wt; wb.classList.toggle('show', !!wt);

  if(spotlight){ const b=$('#newbadge'); b.classList.remove('flash'); void b.offsetWidth; b.classList.add('flash'); }
}

// Werbung einblenden + AD_SECONDS halten (KEIN Ausblenden -> hidePromo() macht das,
// erst nachdem das nächste Foto dahinter aufgebaut ist -> fließender Übergang).
async function showPromoIn(ad){
  $('#comment').classList.remove('show');
  $('#feat-line').textContent = ad.line;
  $('#feat-title').textContent = ad.title;
  $('#feat-price').textContent = ad.price;
  $('#feat-qr').src = '/api/qr.png?data=' + encodeURIComponent(ad.url);
  const wrap = $('#feat-imgs'); wrap.innerHTML = '';
  const cls = ad.imgs.length > 1 ? 'two' : 'one';
  // Pro Bild eine Figur mit Produktname darunter.
  const els = ad.imgs.map((src,i) => {
    const fig = document.createElement('figure'); fig.className = 'feat-fig ' + cls;
    const im = document.createElement('img'); im.src = src; fig.appendChild(im);
    const nm = (ad.names && ad.names[i]) || '';
    if(nm){ const cap = document.createElement('figcaption'); cap.textContent = nm; fig.appendChild(cap); }
    wrap.appendChild(fig); return im;
  });
  // Die TATSÄCHLICH angezeigten <img> dekodieren, bevor eingeblendet wird (kein leeres Panel).
  await Promise.all(els.map(im => (im.complete && im.naturalWidth) ? Promise.resolve() : new Promise(res => {
    if(im.decode){ im.decode().then(res).catch(res); } else { im.onload = res; im.onerror = res; }
    setTimeout(res, 2500);
  })));
  $('#feat').classList.remove('hidden'); void $('#feat').offsetWidth;
  $('#feat').classList.add('show');
  for(let t=0; t<AD_SECONDS*1000 && !ceremony.active; t+=250){ await sleep(250); }  // bricht sofort ab, wenn Siegerehrung startet
}
async function hidePromo(){
  $('#feat').classList.remove('show');
  await sleep(650);
  $('#feat').classList.add('hidden');
}

function setEmpty(isEmpty){
  $('#empty').classList.toggle('hidden', !isEmpty);
  $('#qr').style.display = isEmpty ? 'none' : 'flex';
  $('#brand-tr').style.display = isEmpty ? 'none' : 'block';
}

function buildCerSlides(){
  const w = ceremony.winners || {}; const s = [];
  // Pro Sieger: 5s-Countdown (mit Hinweis) -> Foto sichtbar + Text darunter -> Foto nochmal groß.
  const add = (kicker, url, text) => {
    if(cerFirstPass) s.push({type:'count', kicker});   // Countdown nur beim 1. Durchlauf
    s.push({type:'reveal', kicker, url, text});
    s.push({type:'big',    url});
  };
  if(w.commonality) add('Originellste Gemeinsamkeit', w.commonality.url, '„'+w.commonality.text+'"');
  if(w.photo){
    // KI-Beschreibung NICHT auf dem TV zeigen — stattdessen den Kommentar des Bildes (falls vorhanden).
    const c = (meta.get(w.photo.id) || '').trim();
    add('Originellstes Foto des Abends', w.photo.url, c ? '„'+c+'"' : '');
  }
  if(!s.length) s.push({type:'wait'});
  return s;
}

function cerMode(m){ const c = $('#ceremony'); c.classList.remove('reveal','big'); if(m) c.classList.add(m); }

async function cerSleep(ms){ for(let t=0; t<ms && ceremony.active; t+=200){ await sleep(200); } }  // bricht bei Phasenwechsel sofort ab

async function ceremonyTick(){
  if(cerSlides.length && cerIdx >= cerSlides.length) cerFirstPass = false;  // ab 2. Durchlauf kein Countdown
  if(!cerSlides.length || cerIdx >= cerSlides.length){ cerSlides = buildCerSlides(); cerIdx = 0; }
  const sl = cerSlides[cerIdx++];
  $('#ceremony').classList.remove('hidden');

  if(sl.type === 'wait'){
    cerMode(''); $('#cer-photo').style.display = 'none'; $('#cer-card').style.display = 'flex';
    $('#cer-kicker').textContent = '🏆 Sieger-Show'; $('#cer-count').textContent = '';
    $('#cer-big').textContent = 'Sieger werden ermittelt …';
    $('#cer-sub').textContent = 'Sobald genug Fotos von der KI bewertet sind.';
    await cerSleep(4000); return;
  }

  if(sl.type === 'count'){
    cerMode(''); $('#cer-photo').style.display = 'none'; $('#cer-card').style.display = 'flex';
    $('#cer-kicker').textContent = '🏆 Gleich: ' + sl.kicker;
    $('#cer-big').textContent = ''; $('#cer-sub').textContent = '';
    const el = $('#cer-count');
    for(let n = 5; n >= 1 && ceremony.active; n--){
      el.textContent = n; el.style.animation = 'none'; void el.offsetWidth; el.style.animation = 'cpop .85s ease';
      await cerSleep(1000);
    }
    el.textContent = ''; return;
  }

  // 'reveal' | 'big' -> Foto IMMER sichtbar (auch bei der Gemeinsamkeit)
  const fgU = sl.url, bgU = sl.url + '?w=400';   // Anzeige-Foto + vorab erzeugter Blur-BG
  await decode(fgU);
  $('#cer-card').style.display = 'none'; $('#cer-photo').style.display = 'block';
  $('#cer-bg').style.backgroundImage = `url("${bgU}")`;
  $('#cer-fg').style.backgroundImage = `url("${fgU}")`;
  if(sl.type === 'reveal'){
    cerMode('reveal');
    $('#cer-cap-kicker').textContent = '🏆 ' + sl.kicker;
    $('#cer-cap-text').textContent = sl.text || '';
    await cerSleep(7000);
  } else {
    cerMode('big');
    await cerSleep(4000);
  }
}

function ceremonyHide(){ $('#ceremony').classList.add('hidden'); cerMode(''); $('#cer-photo').style.display = 'none'; $('#cer-card').style.display = 'none'; cerSlides = []; cerIdx = 0; }

// Vorladen: nächste Bilder im Hintergrund dekodieren -> Übergänge sind instant, Diashow stockt nicht.
const _preCache = new Map();   // id -> Image (hält den Browser-Cache warm)
function preload(id){
  if(!id || _preCache.has(id)) return;
  const im = new Image(); im.src = `/photo/${id}`;
  _preCache.set(id, im);
  if(_preCache.size > 14){ const k = _preCache.keys().next().value; _preCache.delete(k); }
}
function preloadNext(){
  if(queue.length) preload(queue[0]);
  if(order.length){ preload(order[(idx+1) % order.length]); preload(order[(idx+2) % order.length]); }
}

function pickNext(){
  if(queue.length) return { id: queue.shift(), spotlight:true };
  if(order.length){ idx = (idx+1) % order.length; return { id: order[idx], spotlight:false }; }
  return null;
}

async function loop(){
  while(true){
    if(ceremony.active){ await ceremonyTick(); continue; }
    if(!$('#ceremony').classList.contains('hidden')) ceremonyHide();
    const pick = pickNext();
    if(!pick){ setEmpty(true); await sleep(800); continue; }
    setEmpty(false);
    await show(pick.id, pick.spotlight);
    preloadNext();   // nächste Bilder schon mal im Hintergrund holen
    await sleep(dwellFor(meta.get(pick.id)||'', pick.spotlight) * 1000);
    shownSinceAd++;
    if(shownSinceAd >= AD_EVERY && !ceremony.active){
      shownSinceAd = 0;
      await showPromoIn(ADS[adIdx % ADS.length]); adIdx++;
      // Nächstes Foto hinter der Werbung aufbauen + vorladen, dann Werbung ausblenden -> fließend.
      const nx = ceremony.active ? null : pickNext();
      if(nx){ await show(nx.id, false); preloadNext(); }
      await hidePromo();
      if(nx) await sleep(dwellFor(meta.get(nx.id)||'', false) * 1000);  // volle Standzeit
    }
  }
}

async function poll(){
  try{
    const r = await fetch('/api/photos');
    const data = await r.json();
    // Nach einem Deploy ändert sich die Version -> Fernseher lädt automatisch neu.
    if(data.version){ if(window.__ver && window.__ver !== data.version){ location.reload(); return; } window.__ver = data.version; }
    const photos = data.photos || [];
    const n = data.count||0;
    $('#count').textContent = n + ' Foto' + (n===1?'':'s');
    // Reihenfolge + Kommentare komplett vom Server übernehmen -> spiegelt
    // Admin-Änderungen (Sortierung, Kommentar bearbeiten, Löschen) live.
    order = photos.map(p=>p.id);
    const present = new Set(order);
    for(const p of photos) meta.set(p.id, p.comment||'');
    for(const id of [...known]) if(!present.has(id)) known.delete(id);  // gelöschte raus
    for(const p of photos){                                            // neue -> Spotlight
      if(!known.has(p.id)){
        known.add(p.id);
        preload(p.id);                       // frischen Upload sofort vorladen
        if(initialized) queue.push(p.id);
      }
    }
    if(idx >= order.length) idx = -1;
    initialized = true;
  }catch(e){ /* Netz weg -> weiterlaufen */ }
}

async function pollCeremony(){
  try{
    const wasActive = ceremony.active;
    ceremony = await (await fetch('/api/ceremony')).json();
    // Show (neu) gestartet -> Countdown wieder ab dem 1. Durchlauf zeigen.
    if(ceremony.active && !wasActive){ cerFirstPass = true; cerSlides = []; cerIdx = 0; }
    // Banner "Wettbewerb beendet – Siegerehrung folgt": nur solange beendet + Sieger noch NICHT gezeigt.
    const eb = $('#endbanner');
    if(eb) eb.classList.toggle('show', ceremony.state === 'ended' && !ceremony.revealed && !ceremony.active);
  }catch(e){}
}

(async function start(){
  await poll();
  await pollCeremony();
  loop();
  setInterval(poll, POLL_MS);
  setInterval(pollCeremony, 3000);
})();

document.body.addEventListener('click', ()=>{ const el=document.documentElement; if(el.requestFullscreen) el.requestFullscreen().catch(()=>{}); });
// Bildschirm wach halten — robust: Re-Acquire nach Freigabe + periodisch + bei Sichtbarkeit.
// (Vorher nur einmaliger Request -> nach Freigabe durch den Browser kam der TV-Bildschirmschoner.)
let _wakeLock = null;
async function keepAwake(){
  try{
    if('wakeLock' in navigator && document.visibilityState === 'visible' && !_wakeLock){
      _wakeLock = await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release', ()=>{ _wakeLock = null; });
    }
  }catch(e){ _wakeLock = null; }
}
keepAwake();
setInterval(keepAwake, 15000);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState === 'visible') keepAwake(); });
</script>
