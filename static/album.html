<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f7f7f5" />
<title>Antjes 60. · Fotoalbum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ---------- Themes ---------- */
  body[data-theme="modern"]{
    --bg:#f6f6f4; --ink:#15171c; --muted:#71757e; --line:#e7e7e3; --card:#ffffff; --accent:#15171c; --gold:#c8772f;
    --font-body:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    --font-display:'Inter',-apple-system,system-ui,sans-serif; --dw:800; --ds:-.025em; --radius:16px;
    --shadow:0 6px 22px rgba(20,20,35,.07); --barbg:rgba(246,246,244,.85);
  }
  body[data-theme="editorial"]{
    --bg:#f4efe7; --ink:#2a2620; --muted:#857d6f; --line:#e0d6c6; --card:#fffdf9; --accent:#b07a3c; --gold:#b07a3c;
    --font-body:'Inter',-apple-system,system-ui,sans-serif;
    --font-display:'Fraunces','Hoefler Text',Georgia,serif; --dw:540; --ds:.004em; --radius:13px;
    --shadow:0 8px 30px rgba(60,45,25,.12); --barbg:rgba(244,239,231,.86);
  }
  body[data-theme="dark"]{
    --bg:#0f1012; --ink:#ededee; --muted:#9aa0a6; --line:#26282d; --card:#1a1c20; --accent:#e0a04a; --gold:#e0a04a;
    --font-body:'Inter',-apple-system,system-ui,sans-serif;
    --font-display:'Fraunces',Georgia,serif; --dw:540; --ds:.004em; --radius:13px;
    --shadow:0 12px 40px rgba(0,0,0,.55); --barbg:rgba(15,16,18,.82);
  }

  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{font-family:var(--font-body); background:var(--bg); color:var(--ink); min-height:100dvh;
    -webkit-font-smoothing:antialiased; --gap:12px; --cols:4}
  .disp{font-family:var(--font-display); font-weight:var(--dw); letter-spacing:var(--ds)}

  /* ---------- Login ---------- */
  #gate{max-width:380px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:24px}
  #gate .lock{font-size:34px; margin-bottom:8px}
  #gate h1{font-size:32px; margin-bottom:6px}
  #gate p{color:var(--muted); font-size:14.5px; margin-bottom:22px}
  #gate input{width:100%; padding:15px 16px; font-size:17px; border-radius:13px; border:1px solid var(--line);
    background:var(--card); color:var(--ink); text-align:center; margin-bottom:12px}
  #gate input:focus{outline:none; border-color:var(--gold)}
  #gate button{width:100%; padding:15px; border:0; border-radius:13px; background:var(--accent); color:#fff;
    font-size:16px; font-weight:700; cursor:pointer}
  body[data-theme="modern"] #gate button{color:#fff}
  #gate .err{color:#d4452e; font-weight:600; font-size:14px; margin-top:12px; min-height:18px}
  #gate .note{color:var(--muted); font-size:13px; margin-top:14px}

  /* ---------- Sticky-Kopf ---------- */
  header.bar{position:sticky; top:0; z-index:40; background:var(--barbg); backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line)}
  .bar-row{display:flex; align-items:center; gap:10px; max-width:1400px; margin:0 auto; padding:11px 16px}
  .bar-title{font-size:19px; white-space:nowrap}
  .bar-title small{color:var(--muted); font-weight:400; font-size:12.5px; margin-left:8px; font-family:var(--font-body)}
  .bar-actions{margin-left:auto; display:flex; gap:8px}
  .act{border:1px solid var(--line); background:var(--card); color:var(--ink); border-radius:999px;
    padding:8px 14px; font-size:13.5px; font-weight:600; cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:6px}
  .act:active{transform:scale(.97)}
  .act.solid{background:var(--accent); color:#fff; border-color:transparent}
  body[data-theme="modern"] .act.solid{color:#fff}
  .act.on{background:var(--ink); color:var(--bg); border-color:transparent}
  .chips{display:flex; gap:8px; overflow-x:auto; padding:0 16px 11px; max-width:1400px; margin:0 auto; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{border:1px solid var(--line); background:var(--card); color:var(--ink); border-radius:999px;
    padding:7px 13px; font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; flex:0 0 auto}

  /* ---------- Hero ---------- */
  .hero{text-align:center; padding:40px 20px 24px; max-width:1400px; margin:0 auto}
  .hero .kick{font-size:12px; letter-spacing:.34em; text-transform:uppercase; color:var(--gold); font-weight:700}
  .hero h1{font-size:clamp(30px,6vw,54px); line-height:1.02; margin:12px 0 10px}
  .hero .sub{color:var(--muted); font-size:15px}

  /* ---------- Gewinner ---------- */
  #winners{max-width:1400px; margin:8px auto 0; padding:0 16px}
  #winners.hidden{display:none}
  .win-head{display:flex; align-items:baseline; gap:12px; padding:0 4px 14px}
  .win-head h2{font-size:clamp(22px,4vw,32px)}
  .win-head .rule{flex:1; height:1px; background:var(--line)}
  .win-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  @media(max-width:620px){ .win-grid{grid-template-columns:1fr} }
  .win-card{position:relative; border-radius:var(--radius); overflow:hidden; background:var(--card); box-shadow:var(--shadow); cursor:pointer}
  /* ganze Fotos zeigen (contain) — funktioniert für Hoch- UND Querformat nebeneinander */
  .win-card .win-ph{background:color-mix(in srgb, var(--ink) 7%, var(--card)); display:flex; align-items:center; justify-content:center; height:clamp(260px,42vh,440px)}
  .win-card .win-ph img{max-width:100%; max-height:100%; width:auto; height:auto; object-fit:contain; display:block}
  .win-meta{padding:14px 16px 16px}
  .win-meta .badge{display:inline-block; font-size:11.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
    color:var(--gold); margin-bottom:6px}
  .win-meta .txt{font-size:16px; line-height:1.3}
  .win-meta .txt.empty{color:var(--muted); font-style:italic}

  /* ---------- Sektionen ---------- */
  main{max-width:1400px; margin:0 auto; padding:0 14px 90px}
  section.sec{margin-top:44px}
  .sec-head{padding:0 4px 14px}
  .sec-head .kick{font-size:12px; letter-spacing:.26em; text-transform:uppercase; color:var(--gold); font-weight:700}
  .sec-head h2{font-size:clamp(27px,5vw,44px); margin-top:5px; display:flex; align-items:baseline; gap:12px; flex-wrap:wrap}
  .sec-head h2 .cnt{font-size:14px; color:var(--muted); font-weight:400; font-family:var(--font-body)}
  .sec-head .rule{height:1px; background:var(--line); margin-top:13px}

  .grid{margin-top:18px}
  .ph{position:relative; border-radius:var(--radius); overflow:hidden; background:var(--card); box-shadow:var(--shadow);
    cursor:pointer; opacity:0; transition:opacity .5s ease}
  .ph.in{opacity:1}
  .ph img, .ph video{width:100%; display:block; background:color-mix(in srgb, var(--ink) 8%, transparent); transition:transform .45s ease}
  @media(hover:hover){ .ph:hover img{transform:scale(1.05)} }
  .ph .playbadge{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:54px; height:54px;
    border-radius:50%; background:rgba(0,0,0,.5); color:#fff; display:flex; align-items:center; justify-content:center;
    font-size:20px; padding-left:4px; pointer-events:none; backdrop-filter:blur(3px); z-index:2}
  .ph .cap{font-family:var(--font-display); font-style:italic; font-size:13.5px; line-height:1.3; color:var(--ink); padding:9px 12px 11px}
  body[data-theme="modern"] .ph .cap{font-style:normal; font-weight:500}
  .ph .pick{position:absolute; top:9px; right:9px; width:26px; height:26px; border-radius:50%; border:2px solid #fff;
    background:rgba(0,0,0,.32); display:none; align-items:center; justify-content:center; color:#fff; font-size:15px; font-weight:800}
  body.selmode .ph .pick{display:flex}
  .ph.sel{outline:3px solid var(--gold); outline-offset:-3px}
  .ph.sel .pick{background:var(--gold)}

  /* Layout: Mosaik (Spalten, variable Höhe) */
  body[data-layout="mosaik"] .grid{column-count:var(--cols); column-gap:var(--gap)}
  body[data-layout="mosaik"] .ph{break-inside:avoid; -webkit-column-break-inside:avoid; margin:0 0 var(--gap); width:100%}
  body[data-layout="mosaik"] .ph img{height:auto}

  /* Layout: Raster (quadratisch, Crop) */
  body[data-layout="raster"] .grid{display:grid; grid-template-columns:repeat(var(--cols),1fr); gap:var(--gap)}
  body[data-layout="raster"] .ph{aspect-ratio:1}
  body[data-layout="raster"] .ph img, body[data-layout="raster"] .ph video{width:100%; height:100%; object-fit:cover}
  body[data-layout="raster"] .ph .cap{position:absolute; left:0; right:0; bottom:0; color:#fff; padding:18px 12px 9px;
    background:linear-gradient(0deg,rgba(0,0,0,.72),transparent); font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}

  /* ---------- Lightbox ---------- */
  #lb{position:fixed; inset:0; z-index:60; background:rgba(12,12,14,.97); display:none; flex-direction:column}
  #lb.show{display:flex}
  #lb .lb-top{display:flex; align-items:center; gap:12px; padding:14px 16px; color:#f3f3f3}
  #lb .lb-top .meta{font-size:13px; color:#bcbcbc}
  #lb .lb-top .sp{margin-left:auto}
  #lb .lb-btn{border:1px solid rgba(255,255,255,.28); background:rgba(255,255,255,.08); color:#fff; border-radius:999px;
    padding:9px 15px; font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-block}
  #lb .lb-btn.dl{background:var(--gold); border-color:transparent; color:#1a1206}
  #lb .lb-stage{flex:1; position:relative; display:flex; align-items:center; justify-content:center; min-height:0; padding:0 8px}
  #lb img, #lb video{max-width:96vw; max-height:80vh; object-fit:contain; border-radius:6px; box-shadow:0 24px 70px rgba(0,0,0,.6)}
  #lb video{background:#000}
  #lb .nav{position:absolute; top:50%; transform:translateY(-50%); width:52px; height:52px; border-radius:50%; border:0;
    background:rgba(255,255,255,.12); color:#fff; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center}
  #lb .prev{left:10px} #lb .next{right:10px}
  #lb .lb-cap{font-family:var(--font-display); font-style:italic; color:#fff; text-align:center; font-size:clamp(16px,2.4vw,21px);
    line-height:1.35; padding:15px 22px 24px; max-width:760px; margin:0 auto; min-height:8px}

  /* ---------- Auswahl ---------- */
  #selbar{position:fixed; left:0; right:0; bottom:0; z-index:50; display:none; justify-content:center; padding:12px; pointer-events:none}
  body.selmode #selbar{display:flex}
  #selbar .inner{pointer-events:auto; background:var(--ink); color:var(--bg); border-radius:16px; box-shadow:0 12px 40px rgba(0,0,0,.3);
    display:flex; align-items:center; gap:14px; padding:11px 14px 11px 18px; max-width:560px; width:100%}
  #selbar .cnt{font-weight:700; font-size:14.5px}
  #selbar .sp{margin-left:auto; display:flex; gap:8px}
  #selbar button{border:0; border-radius:11px; padding:11px 15px; font-size:14px; font-weight:700; cursor:pointer}
  #selbar .dl{background:var(--gold); color:#1a1206}
  #selbar .clr{background:rgba(125,125,125,.3); color:var(--bg)}

  #toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); z-index:70; background:var(--ink);
    color:var(--bg); padding:12px 20px; border-radius:999px; font-size:14px; font-weight:600; opacity:0;
    transition:opacity .3s, transform .3s; pointer-events:none; box-shadow:0 8px 30px rgba(0,0,0,.3)}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  #loading{text-align:center; color:var(--muted); padding:60px 20px; font-size:15px}
  .hidden{display:none !important}
</style>
</head>
<body data-theme="editorial" data-layout="mosaik">

<section id="gate" class="hidden">
  <div class="lock">📔</div>
  <h1 class="disp">Antje 60.</h1>
  <p>Das Fotoalbum ist passwortgeschützt.</p>
  <input id="pw" type="password" autocomplete="current-password" placeholder="Passwort" />
  <button id="btn-login">Album öffnen</button>
  <div class="err" id="login-err"></div>
  <div class="note" id="gate-note"></div>
</section>

<div id="app" class="hidden">
  <header class="bar">
    <div class="bar-row">
      <div class="bar-title disp">Antje 60. <small id="bar-count"></small></div>
      <div class="bar-actions">
        <button class="act" id="btn-select">Auswählen</button>
        <button class="act solid" id="btn-all">⤓ Alle</button>
      </div>
    </div>
    <nav class="chips" id="chips"></nav>
  </header>

  <section class="hero">
    <div class="kick">Ein Abend in Bildern</div>
    <h1 class="disp">Antje 60. Geburtstag</h1>
    <div class="sub" id="hero-sub"></div>
  </section>

  <section id="winners" class="hidden">
    <div class="win-head"><h2 class="disp">🏆 Die Gewinner des Abends</h2><div class="rule"></div></div>
    <div class="win-grid" id="win-grid"></div>
  </section>

  <div id="loading">Lädt …</div>
  <main id="sections"></main>
</div>

<div id="lb">
  <div class="lb-top">
    <span class="meta" id="lb-meta"></span>
    <span class="sp"></span>
    <a class="lb-btn dl" id="lb-dl" download>⤓ Herunterladen</a>
    <button class="lb-btn" id="lb-close">✕</button>
  </div>
  <div class="lb-stage">
    <button class="nav prev" id="lb-prev" aria-label="zurück">‹</button>
    <img id="lb-img" alt="" />
    <video id="lb-video" controls playsinline style="display:none"></video>
    <button class="nav next" id="lb-next" aria-label="weiter">›</button>
  </div>
  <div class="lb-cap disp" id="lb-cap"></div>
</div>

<div id="selbar"><div class="inner">
  <span class="cnt" id="sel-count">0 ausgewählt</span>
  <span class="sp"><button class="clr" id="sel-clear">Aufheben</button><button class="dl" id="sel-dl">⤓ Herunterladen</button></span>
</div></div>

<div id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const PHASE_FALLBACK = ['geburtstag','werdersee','preparty','auftritt','party','breakfast','weitere'];
let PHOTOS = [], selectMode = false;
const selected = new Set();

// ---------- Ansicht-Einstellungen (gespeichert) ----------
const store = {
  get layout(){ return localStorage.getItem('alb_layout') || 'mosaik'; },
  get cols(){ return parseInt(localStorage.getItem('alb_cols') || '0') || 0; },
};
function defaultCols(){ const w=innerWidth; return w<560?2 : w<920?3 : 4; }
function applyLayout(l){ if(l!=='mosaik'&&l!=='raster') l='mosaik'; document.body.dataset.layout=l; localStorage.setItem('alb_layout',l); markSeg('seg-layout',l); }
// Regler: rechts = größer = weniger Spalten (cols). value 1..6, cols = 7 - value.
function applyCols(n){ n=Math.max(1,Math.min(6,n)); localStorage.setItem('alb_cols',String(n));
  document.body.style.setProperty('--cols', String(n));
  const r=$('#rng-size'); if(r) r.value=String(7-n); }
function markSeg(id,v){ document.querySelectorAll('#'+id+' button').forEach(b=> b.classList.toggle('on', b.dataset.v===v)); }
function srcFor(p){ return '/photo/'+p.id+'?w=1000'; }   // scharfe Miniatur (~1000px, gecacht)

// ---------- Auth ----------
async function init(){
  document.body.dataset.theme='editorial';
  try{ document.querySelector('meta[name=theme-color]').setAttribute('content', getComputedStyle(document.body).backgroundColor); }catch(e){}
  applyLayout(store.layout); applyCols(store.cols || defaultCols());
  let st; try{ st = await (await fetch('/api/album/state')).json(); }catch(e){ st={enabled:false,authed:false}; }
  if(st.authed){ showApp(); return; }
  $('#gate').classList.remove('hidden');
  if(!st.enabled){ $('#pw').disabled=true; $('#btn-login').disabled=true; $('#gate-note').textContent='Das Album wurde noch nicht freigeschaltet.'; }
}
async function login(){
  const pw=$('#pw').value; if(!pw) return;
  const fd=new FormData(); fd.append('pw',pw); $('#login-err').textContent='';
  try{ const r=await fetch('/api/album/login',{method:'POST',body:fd});
    if(r.ok){ $('#gate').classList.add('hidden'); showApp(); }
    else if(r.status===401){ $('#login-err').textContent='Falsches Passwort'; }
    else { $('#login-err').textContent='Album ist noch nicht freigeschaltet.'; }
  }catch(e){ $('#login-err').textContent='Verbindungsfehler'; }
}
$('#btn-login').addEventListener('click', login);
$('#pw').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });

// ---------- Galerie ----------
async function showApp(){
  $('#app').classList.remove('hidden');
  let data;
  try{ const r=await fetch('/api/album/photos');
    if(r.status===401){ $('#app').classList.add('hidden'); $('#gate').classList.remove('hidden'); return; }
    if(!r.ok) throw new Error('HTTP '+r.status); data=await r.json();
  }catch(e){ $('#loading').textContent='Konnte das Album nicht laden.'; return; }
  $('#loading').classList.add('hidden');
  const order=(data.phases&&data.phases.length)?data.phases:PHASE_FALLBACK.map(k=>({key:k,label:k}));
  const labels={}; order.forEach(p=>labels[p.key]=p.label);
  const byPhase={}; (data.photos||[]).forEach(p=>{(byPhase[p.phase]=byPhase[p.phase]||[]).push(p);});
  $('#bar-count').textContent=(data.count||0)+' Fotos';
  $('#hero-sub').textContent=(data.count||0)+' Momente · chronologisch erzählt';

  const sectionsEl=$('#sections'); sectionsEl.innerHTML=''; const chipsEl=$('#chips'); chipsEl.innerHTML=''; PHOTOS=[];
  let chapter=0;
  order.forEach(ph=>{
    const list=byPhase[ph.key]; if(!list||!list.length) return; chapter++;
    const secId='sec-'+ph.key;
    const chip=document.createElement('button'); chip.className='chip'; chip.textContent=labels[ph.key]||ph.key;
    chip.addEventListener('click',()=>document.getElementById(secId).scrollIntoView({behavior:'smooth',block:'start'}));
    chipsEl.appendChild(chip);
    const sec=document.createElement('section'); sec.className='sec'; sec.id=secId;
    const num=String(chapter).padStart(2,'0');
    sec.innerHTML=`<div class="sec-head"><div class="kick">Kapitel ${num}</div>
      <h2 class="disp">${esc(labels[ph.key]||ph.key)} <span class="cnt">${list.length} Foto${list.length===1?'':'s'}</span></h2>
      <div class="rule"></div></div><div class="grid"></div>`;
    const grid=sec.querySelector('.grid');
    list.forEach(p=>{
      const idx=PHOTOS.length; PHOTOS.push(p);
      const fig=document.createElement('figure'); fig.className='ph'; fig.dataset.idx=idx; fig.dataset.id=p.id;
      const media = p.kind==='video'
        ? `<video preload="metadata" muted playsinline src="${p.url}#t=0.1"></video><span class="playbadge">▶</span>`
        : `<img loading="lazy" data-id="${p.id}" src="${srcFor(p)}" alt="">`;
      fig.innerHTML=`<span class="pick">✓</span>${media}`+(p.comment?`<figcaption class="cap">${esc(p.comment)}</figcaption>`:'');
      const im=fig.querySelector('img'); if(im) im.addEventListener('error',()=>{ fig.style.display='none'; });
      fig.addEventListener('click',()=>{ selectMode?toggleSelect(fig):openLightbox(idx); });
      grid.appendChild(fig); io.observe(fig);
    });
    sectionsEl.appendChild(sec);
  });
  loadWinners();
}
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function loadWinners(){
  let cer; try{ cer=await (await fetch('/api/ceremony')).json(); }catch(e){ return; }
  const w=cer&&cer.winners||{}; const cards=[];
  if(w.commonality) cards.push({id:w.commonality.id, badge:'Originellste Gemeinsamkeit', txt:w.commonality.text||''});
  if(w.photo) cards.push({id:w.photo.id, badge:'Originellstes Foto', txt:w.photo.comment||''});
  if(!cards.length) return;
  const g=$('#win-grid'); g.innerHTML='';
  cards.forEach(c=>{
    const el=document.createElement('div'); el.className='win-card';
    el.innerHTML=`<div class="win-ph"><img src="/photo/${c.id}?w=1000" alt=""></div><div class="win-meta"><span class="badge">🏆 ${esc(c.badge)}</span>
      <div class="txt${c.txt?'':' empty'}">${c.txt?'„'+esc(c.txt)+'"':'ohne Kommentar'}</div></div>`;
    el.addEventListener('click',()=>{ const i=PHOTOS.findIndex(p=>p.id===c.id); if(i>=0) openLightbox(i); });
    g.appendChild(el);
  });
  $('#winners').classList.remove('hidden');
}

const io=new IntersectionObserver(es=>{ es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }); },{rootMargin:'150px'});

// ---------- Lightbox ----------
let lbIdx=-1;
function openLightbox(idx){ const p=PHOTOS[idx]; if(!p) return; lbIdx=idx;
  const isVid=p.kind==='video'; const img=$('#lb-img'), vid=$('#lb-video');
  if(isVid){ img.style.display='none'; img.removeAttribute('src'); vid.style.display='block'; vid.src=p.url; vid.play().catch(()=>{}); }
  else { vid.pause(); vid.removeAttribute('src'); vid.style.display='none'; img.style.display='block'; img.src='/photo/'+p.id; }
  $('#lb-cap').textContent=p.comment?'„'+p.comment+'"':'';
  $('#lb-meta').textContent=(idx+1)+' / '+PHOTOS.length;
  const dl=$('#lb-dl');
  if(isVid){ dl.href=p.url+'?dl=1'; dl.setAttribute('download',''); }       // Server liefert Dateiname+Endung
  else { dl.href='/photo/'+p.id+'?full=1'; dl.setAttribute('download','Antje-60-'+(p.phase||'foto')+'-'+(idx+1)+'.jpg'); }
  $('#lb').classList.add('show'); }
function lbStep(d){ let n=lbIdx+d; if(n<0)n=PHOTOS.length-1; if(n>=PHOTOS.length)n=0; openLightbox(n); }
function closeLb(){ $('#lb').classList.remove('show'); const v=$('#lb-video'); v.pause(); v.removeAttribute('src'); $('#lb-img').removeAttribute('src'); lbIdx=-1; }
$('#lb-close').addEventListener('click',closeLb);
$('#lb-prev').addEventListener('click',e=>{e.stopPropagation();lbStep(-1);});
$('#lb-next').addEventListener('click',e=>{e.stopPropagation();lbStep(1);});
$('#lb').addEventListener('click',e=>{ if(e.target.id==='lb'||e.target.classList.contains('lb-stage')) closeLb(); });
document.addEventListener('keydown',e=>{ if(!$('#lb').classList.contains('show'))return;
  if(e.key==='Escape')closeLb(); else if(e.key==='ArrowLeft')lbStep(-1); else if(e.key==='ArrowRight')lbStep(1); });

// ---------- Auswahl + Download ----------
$('#btn-select').addEventListener('click',()=>{ selectMode=!selectMode; document.body.classList.toggle('selmode',selectMode);
  $('#btn-select').classList.toggle('on',selectMode); $('#btn-select').textContent=selectMode?'Fertig':'Auswählen'; if(!selectMode) clearSel(); });
function toggleSelect(fig){ const id=fig.dataset.id; if(selected.has(id)){selected.delete(id);fig.classList.remove('sel');}else{selected.add(id);fig.classList.add('sel');} updateSelBar(); }
function clearSel(){ selected.clear(); document.querySelectorAll('.ph.sel').forEach(f=>f.classList.remove('sel')); updateSelBar(); }
function updateSelBar(){ $('#sel-count').textContent=selected.size+' ausgewählt'; }
$('#sel-clear').addEventListener('click',clearSel);
$('#sel-dl').addEventListener('click',()=>{ if(!selected.size){toast('Erst Fotos antippen');return;} download('/api/album/zip?ids='+[...selected].join(','), selected.size+' Fotos werden gepackt …'); });
$('#btn-all').addEventListener('click',()=> download('/api/album/zip','Alle Fotos werden gepackt – das dauert einen Moment …'));
function download(url,msg){ toast(msg); const a=document.createElement('a'); a.href=url; document.body.appendChild(a); a.click(); a.remove(); }
let _tt; function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),3500); }

init();
</script>
</body>
</html>
